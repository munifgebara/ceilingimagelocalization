apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# O secret teto-banco e o Job de migracao sao gerenciados pelo script de deploy
# (deploy/scripts/deploy-gimli.sh), nao por este kustomization.
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - ingress.yaml
