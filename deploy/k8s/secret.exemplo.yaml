# EXEMPLO — nao contem segredos reais e nao deve ser aplicado diretamente.
# O secret real (teto-banco) e criado pelo script de deploy a partir das
# credenciais do Postgres compartilhado (secret postgres-secret no namespace platform).
#
# Conteudo esperado:
#   BANCO_URL = postgresql+psycopg://<usuario>:<senha>@postgres.platform.svc.cluster.local:5432/teto
apiVersion: v1
kind: Secret
metadata:
  name: teto-banco
  namespace: teto
type: Opaque
stringData:
  BANCO_URL: "postgresql+psycopg://USUARIO:SENHA@postgres.platform.svc.cluster.local:5432/teto"
