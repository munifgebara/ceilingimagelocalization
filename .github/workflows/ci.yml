name: CI

# Roda lint e testes do backend em cada push e Pull Request para a master.
# Usa o runner self-hosted do gimli.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (lint + testes)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Subir Postgres de teste (pgvector)
        run: |
          docker rm -f teto-banco-ci 2>/dev/null || true
          docker run -d --name teto-banco-ci \
            -e POSTGRES_USER=teto -e POSTGRES_PASSWORD=teto -e POSTGRES_DB=teto \
            -p 55432:5432 pgvector/pgvector:pg17
          for i in $(seq 1 30); do
            docker exec teto-banco-ci pg_isready -U teto && break || sleep 1
          done

      - name: Instalar dependências
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: . .venv/bin/activate && ruff check .

      - name: Testes (pytest)
        env:
          BANCO_URL: postgresql+psycopg://teto:teto@localhost:55432/teto
        run: . .venv/bin/activate && pytest -q

      - name: Limpar Postgres de teste
        if: always()
        run: docker rm -f teto-banco-ci 2>/dev/null || true
