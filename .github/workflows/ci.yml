name: CI

# Roda lint e testes do backend em cada push e Pull Request para a master.
# Usa runner hospedado do GitHub (gratis em repositorio publico).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (lint + testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: teto
          POSTGRES_PASSWORD: teto
          POSTGRES_DB: teto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teto"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Testes (pytest)
        env:
          BANCO_URL: postgresql+psycopg://teto:teto@localhost:5432/teto
        run: pytest -q
